stages:
  - lint
  - security
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "azure-function"

before_script:
  - python -m pip install --upgrade pip
  - pip install -r azure-function/requirements-dev.txt
  - pip install ruff bandit

ruff_lint:
  stage: lint
  script:
    - ruff check azure-function

bandit_scan:
  stage: security
  script:
    - bandit -r azure-function

unit_and_integration_tests:
  stage: test
  script:
    - cd azure-function
    - python -m unittest discover -s tests -v
  artifacts:
    when: always
    paths:
      - azure-function/.coverage
    reports:
      junit: junit-report.xml
