

[tool.ruff]
line-length = 120

[tool.ruff.lint]
# Enable Ruff's security rules (S), bugbear (B), isort (I), and default (E, F)
select = ["E", "F", "B", "S", "I"]
ignore = []


[tool.ruff.format]
# Use Black-compatible formatting
quote-style = "double"
indent-style = "space"
line-ending = "auto"


